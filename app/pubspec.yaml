name: nuvempark_app
description: "NuvemPark — Operação de Pátio (offline-first, multi-tenant)"
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Pacote compartilhado vendorizado (Dio factory, SecureStorage, ApiException, widgets base)
  nuvempark_core:
    path: packages/nuvempark_core

  # Estado
  flutter_riverpod: ^3.3.1
  # HTTP
  dio: ^5.9.2
  # Roteamento
  go_router: ^17.3.0
  # Banco local offline-first
  drift: ^2.22.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.4
  path: ^1.9.0
  # Storage seguro (token, device uuid)
  flutter_secure_storage: ^10.3.1
  # Utils
  crypto: ^3.0.5
  uuid: ^4.5.3
  connectivity_plus: ^7.0.0
  intl: ^0.20.2
  # QR (leitura na saída / geração no cupom de entrada)
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0
  # Impressão térmica ESC/POS
  print_bluetooth_thermal: ^1.1.3
  # Permissões (BT/câmera)
  permission_handler: ^11.3.1
  # Câmera própria (preview + moldura-guia + foco/zoom na captura de placa)
  camera: ^0.11.0
  # Foto de entrada — fallback quando a câmera própria falha (câmera do sistema)
  image_picker: ^1.2.3
  # OCR de placa on-device
  google_mlkit_text_recognition: ^0.15.1
  # Decode/crop/orientação em memória (recorte da ROI antes do OCR)
  image: ^4.3.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.22.0
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.4

# sqlite3 3.3.4 tem um bug de hash nos native-assets nesta toolchain
# ("Hash of downloaded file libsqlite3.arm.android.so ... expected ...").
# Pinamos em 3.3.2 (a versão que o leve-patio usa e builda OK).
dependency_overrides:
  sqlite3: 3.3.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon/

# Branding NuvemPark — verde
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 23
  adaptive_icon_background: "#059669"
  adaptive_icon_foreground: "assets/icon/app_icon_fg.png"
